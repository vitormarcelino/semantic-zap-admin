services:
  app:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.local
    environment:
      DATABASE_URL: postgresql://semanticzap:semanticzap@postgres:5432/semanticzap
      REDIS_URL: redis://172.17.0.1:6379
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then
        npm ci;
      fi &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      rm -rf .next/* &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    ports:
      - "3300:3000"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - next_cache:/app/.next

  worker:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - .env.local
    environment:
      DATABASE_URL: postgresql://semanticzap:semanticzap@postgres:5432/semanticzap
      REDIS_URL: redis://172.17.0.1:6379
      INTERNAL_API_BASE_URL: http://app:3000
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then
        npm ci;
      fi &&
      npx prisma generate &&
      npm run worker:dev
      "
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: semanticzap
      POSTGRES_PASSWORD: semanticzap
      POSTGRES_DB: semanticzap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semanticzap -d semanticzap"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  app_node_modules:
  next_cache:
  postgres_data:
